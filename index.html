<!doctype html>
<html
  lang="en"
  data-theme="dark"
  style="color-scheme: dark; background-color: #111114"
>
  <head>
    <meta charset="UTF-8" />
    <!-- Restore theme before first paint to prevent white flash -->
    <script>
      (function () {
        var t = localStorage.getItem("st-theme");
        if (!t)
          t = matchMedia("(prefers-color-scheme:light)").matches
            ? "light"
            : "dark";
        if (t !== "dark" && t !== "light") t = "dark";
        var d = document.documentElement;
        d.setAttribute("data-theme", t);
        d.style.colorScheme = t;
        d.style.backgroundColor = t === "dark" ? "#111114" : "#f5f3ef";
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111114" />
    <title>/table — The database client for product engineers</title>
    <meta
      name="description"
      content="A native macOS database client with graph navigation, interactive ER diagramming, a built-in MCP server for AI agents, and a plugin system. PostgreSQL and MySQL."
    />
    <meta property="og:site_name" content="/table" />
    <meta property="og:locale" content="en_US" />
